name: material_async_button
description: >-
  Drop-in async wrappers for Flutter Material buttons. Adds loading, success,
  and error states with theming via ThemeExtension and external control via a
  controller.
version: 1.0.0
repository: https://github.com/esenmx/async_button_builder
issue_tracker: https://github.com/esenmx/async_button_builder/issues

topics:
  - button
  - async
  - material
  - loading
  - form

environment:
  sdk: ^3.10.0
  flutter: ">=3.40.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

screenshots:
  - description: Elevated button cycling through loading, success, and error.
    path: screenshots/ezgif-7-61c436edaec2.gif
  - description: State-driven background color via the builder.
    path: screenshots/ezgif-7-a971c6afaabf.gif
  - description: Custom Material button with bounce-in loading transition.
    path: screenshots/ezgif-7-4088c909ba83.gif
