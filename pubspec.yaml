name: material_async_button
description: >-
  Drop-in async wrappers for Flutter Material buttons. Adds a loading state,
  with theming via ThemeExtension and external control via a controller.
version: 2.0.1
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/material_async_button
issue_tracker: https://github.com/esenmx/material_async_button/issues
documentation: https://pub.dev/documentation/material_async_button/latest/

topics:
  - button
  - async
  - material
  - loading
  - form

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  checks: ^0.3.1
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
